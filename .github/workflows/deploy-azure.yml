name: UserService CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SOLUTION_PATH: UserService.sln
  PROJECT_PATH: src/UserService.Api/UserService.Api.csproj
  PUBLISH_PATH: ./publish
  ZIP_PATH: ./userservice.zip
  APP_NAME: userservice-api-cc
  RESOURCE_GROUP: rg-userservice-prod

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build and run all tests
  # Runs on every push and every pull request.
  # Pull requests that fail tests cannot be merged.
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Run all tests
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: UserService Tests
          path: '**/test-results.trx'
          reporter: dotnet-trx

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Publish the API project
  # Only runs on push to main (not on pull requests).
  # Produces a zip artifact that the deploy job picks up.
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Publish API
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ${{ env.PUBLISH_PATH }} \
            --no-restore

      - name: Zip publish output
        run: |
          cd ${{ env.PUBLISH_PATH }}
          zip -r ../${{ env.ZIP_PATH }} .

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: userservice-zip
          path: ${{ env.ZIP_PATH }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Azure App Service
  # Only runs on push to main after publish succeeds.
  # Uses the AZURE_CREDENTIALS secret you set in GitHub.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: userservice-zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        run: |
          az webapp deploy \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src-path userservice.zip \
            --type zip \
            --clean true \
            --async true

      - name: Wait for app to be healthy
        run: |
          URL="https://${{ env.APP_NAME }}.azurewebsites.net/health"
          echo "Polling health endpoint: $URL"
          for i in {1..36}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is live and healthy after attempt $i!"
              exit 0
            fi
            echo "Attempt $i/36: not ready yet (HTTP $STATUS) — waiting 10s..."
            sleep 10
          done
          echo "❌ App failed to become healthy within 6 minutes"
          exit 1
